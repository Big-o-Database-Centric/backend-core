name: Deploy Backend Core

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Calcular nombre de imagen en minúsculas
        id: image
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy al VPS Big-O
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker stop backend-core || true
            docker rm backend-core || true
            docker run -d \
              --name backend-core \
              --restart unless-stopped \
              -p 3000:3000 \
              -e NODE_ENV=production \
              -e CORS_ORIGIN="${{ vars.CORS_ORIGIN || 'https://big-o.andrescortes.dev' }}" \
              -e AUTH_SECRET="${{ secrets.AUTH_SECRET }}" \
              -e PUBLIC_BASE_URL="${{ vars.PUBLIC_BASE_URL || 'https://big-o.andrescortes.dev' }}" \
              -e AUTH_GOOGLE_ID="${{ secrets.AUTH_GOOGLE_ID }}" \
              -e AUTH_GOOGLE_SECRET="${{ secrets.AUTH_GOOGLE_SECRET }}" \
              -e AUTH_GITHUB_ID="${{ secrets.AUTH_GITHUB_ID }}" \
              -e AUTH_GITHUB_SECRET="${{ secrets.AUTH_GITHUB_SECRET }}" \
              -e SQL_SERVER="${{ secrets.SQL_SERVER }}" \
              -e SQL_PORT="${{ secrets.SQL_PORT }}" \
              -e SQL_USER="${{ secrets.SQL_USER }}" \
              -e SQL_PASSWORD="${{ secrets.SQL_PASSWORD }}" \
              -e SQL_DATABASE="${{ secrets.SQL_DATABASE }}" \
              -e SQL_SERVER_ENCRYPT="${{ secrets.SQL_SERVER_ENCRYPT }}" \
              -e SQL_SERVER_TRUST_SERVER_CERT="${{ secrets.SQL_SERVER_TRUST_SERVER_CERT }}" \
              ${{ env.IMAGE_NAME }}:latest
            docker image prune -f

# Secrets requeridos (nivel repo u organización):
#   VPS_HOST, VPS_USER, SSH_KEY → acceso SSH al VPS
#   SQL_SERVER, SQL_PORT, SQL_USER, SQL_PASSWORD, SQL_DATABASE → conexión SQL
#     (SQL_SERVER, SQL_USER, SQL_PASSWORD, SQL_DATABASE se leen con getOrThrow:
#      si faltan, el contenedor no arranca)
#   SQL_SERVER_ENCRYPT, SQL_SERVER_TRUST_SERVER_CERT → opcionales (default true/false)
#   AUTH_SECRET                    → openssl rand -base64 32
#   AUTH_GOOGLE_ID / AUTH_GOOGLE_SECRET → Google Cloud Console (OAuth client)
#   AUTH_GITHUB_ID / AUTH_GITHUB_SECRET → GitHub OAuth App
#
# Los cinco AUTH_* los leen las estrategias OAuth con getOrThrow al construirse:
# si falta cualquiera, TODO el backend falla al arrancar (no solo OAuth).
# PUBLIC_BASE_URL se pasa como variable (vars) con default al dominio de prod.
