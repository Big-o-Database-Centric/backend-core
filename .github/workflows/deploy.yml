name: Deploy Backend Core

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy al VPS Big-O
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker stop backend-core || true
            docker rm backend-core || true
            docker run -d \
              --name backend-core \
              --restart unless-stopped \
              -p 3000:3000 \
              -e NODE_ENV=production \
              -e PORT=3000 \
              -e SQL_SERVER="${{ secrets.SQL_SERVER }}" \
              -e SQL_DATABASE="${{ secrets.SQL_DATABASE }}" \
              -e SQL_USER="${{ secrets.SQL_USER }}" \
              -e SQL_PASSWORD="${{ secrets.SQL_PASSWORD }}" \
              -e SQL_PORT="${{ secrets.SQL_PORT }}" \
              -e SQL_SERVER_ENCRYPT="${{ secrets.SQL_SERVER_ENCRYPT }}" \
              -e SQL_SERVER_TRUST_SERVER_CERT="${{ secrets.SQL_SERVER_TRUST_SERVER_CERT }}" \
              -e CORS_ORIGIN="${{ secrets.CORS_ORIGIN }}" \
              ${{ env.IMAGE_NAME }}:latest
            docker image prune -f

# Secrets requeridos (nivel repo u organización):
#   VPS_HOST, VPS_USER, VPS_SSH_KEY → acceso SSH al VPS
#   SQL_SERVER      → host/SERVIDOR SQL Server
#   SQL_DATABASE   → nombre de la base de datos
#   SQL_USER       → usuario de la base de datos
#   SQL_PASSWORD   → contraseña de la base de datos
#   SQL_PORT       → puerto (default 1433)
#   SQL_SERVER_ENCRYPT          → true/false
#   SQL_SERVER_TRUST_SERVER_CERT→ true/false
#   CORS_ORIGIN   → origen permitido (ej. https://big-o.andrescortes.dev)
